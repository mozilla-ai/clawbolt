name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --all-extras
      - run: uv run ruff check backend/ tests/ alembic/
      - run: uv run ruff format --check backend/ tests/ alembic/

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --all-extras
      - run: uv run ty check --python .venv backend/ tests/ alembic/

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: clawbolt
          POSTGRES_PASSWORD: clawbolt
          POSTGRES_DB: clawbolt_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      # Surface any 1.x Query API call sites in CI logs as a regression
      # signal (the async-DB migration in #1139 removed them). Non-blocking:
      # warnings are visible but do not fail the build.
      SQLALCHEMY_WARN_20: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --all-extras
      # ``-n auto`` runs the suite across one xdist worker per CPU core. The
      # conftest derives a per-worker test DB (``clawbolt_test_gw0`` etc.)
      # from ``PYTEST_XDIST_WORKER`` and auto-creates them by connecting to
      # the ``postgres`` admin DB. The ``POSTGRES_USER: clawbolt`` service
      # makes ``clawbolt`` the cluster superuser, so ``CREATE DATABASE``
      # succeeds without further setup. Sequential runs and ``OSS_TEST_DB``
      # overrides still work unchanged.
      - run: uv run pytest -n auto -v

  e2e-telegram:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: clawbolt
          POSTGRES_PASSWORD: clawbolt
          POSTGRES_DB: clawbolt_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_TEST_CHAT_ID: ${{ secrets.TELEGRAM_TEST_CHAT_ID }}
      SQLALCHEMY_WARN_20: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --all-extras
      - run: uv run pytest -m e2e -v --timeout=60

  e2e-playwright:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: clawbolt
          POSTGRES_PASSWORD: clawbolt
          POSTGRES_DB: clawbolt_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: uv sync --all-extras
      - working-directory: frontend
        run: npm ci
      - working-directory: frontend
        run: npm run build
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run e2e
        env:
          DATABASE_URL: postgresql://clawbolt:clawbolt@localhost:5432/clawbolt_e2e
          CI: true
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

  frontend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: uv sync --all-extras
      - run: uv run python scripts/export_openapi.py
      - working-directory: frontend
        run: npm ci
      - working-directory: frontend
        run: npm run generate:api
      - name: Check generated types are up to date
        run: git diff --exit-code frontend/openapi.json frontend/src/generated/api.d.ts
      - working-directory: frontend
        run: npm run typecheck
      - working-directory: frontend
        run: npm run deadcode

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: false
      - name: Validate docker-compose.yml
        run: docker compose config --quiet

  integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: clawbolt
          POSTGRES_PASSWORD: clawbolt
          POSTGRES_DB: clawbolt_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      SQLALCHEMY_WARN_20: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --all-extras
      - run: uv run pytest -m integration -v --timeout=120
