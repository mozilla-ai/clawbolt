<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#F6F5F3" />
  <meta name="description" content="AI assistant for the trades" />
  <!-- Apply the saved/system color theme before first paint to avoid a flash.
       Mirrors src/lib/theme.ts; keep the storage key and logic in sync. -->
  <script>
    (function () {
      try {
        var stored = localStorage.getItem('clawbolt-theme');
        var pref = stored === 'light' || stored === 'dark' ? stored : 'system';
        var dark = pref === 'dark' || (pref === 'system' && matchMedia('(prefers-color-scheme: dark)').matches);
        document.documentElement.classList.toggle('dark', dark);
        var m = document.querySelector('meta[name="theme-color"]');
        if (m) m.setAttribute('content', dark ? '#1A1816' : '#F6F5F3');
      } catch (e) {}
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=Outfit:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/png" href="/clawbolt.png" />
  <!-- TODO: add a real 180x180 PNG apple-touch-icon (SVG is not supported by iOS) -->
  <title>Clawbolt</title>
</head>
<body>
  <div id="root"></div>
  <noscript>
    <style>.ns-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:system-ui,sans-serif;padding:2rem;text-align:center}.ns-title{font-size:1.5rem;margin-bottom:.5rem}.ns-text{color:#666}</style>
    <div class="ns-wrap">
      <div>
        <h1 class="ns-title">JavaScript Required</h1>
        <p class="ns-text">Clawbolt requires JavaScript to run. Please enable it in your browser settings.</p>
      </div>
    </div>
  </noscript>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
